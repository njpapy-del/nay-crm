# ============================================================
# LNAYCRM — Redis config (MVP 5 agents)
# ============================================================

# Persistance : AOF + snapshot toutes les 5min si ≥1 write
save 300 1
save 60 100
appendonly yes
appendfsync everysec

# Mémoire max : 512MB avec éviction LRU pour les données volatiles
maxmemory 512mb
maxmemory-policy allkeys-lru

# Connexions : largement suffisant pour 5 agents + queues BullMQ
maxclients 100

# Logs sobres
loglevel notice

# Désactiver les commandes dangereuses en production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""

# Performance réseau Docker
tcp-keepalive 300
tcp-backlog 128
