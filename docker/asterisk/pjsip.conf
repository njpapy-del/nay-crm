; ============================================================
; LNAYCRM — pjsip.conf (mode LOCAL SIMULATION)
; Pas de SIP trunk externe — uniquement agents internes
; Numérotation interne : 1001–1010 (10 agents max MVP)
; ============================================================

; ─── Transport UDP interne ─────────────────────────────────
[transport-udp]
type     = transport
protocol = udp
bind     = 0.0.0.0:5060

; Transport WebSocket pour softphones navigateur (JsSIP)
[transport-ws]
type     = transport
protocol = ws
bind     = 0.0.0.0:8088

; ─── Template agent ────────────────────────────────────────
[agent-template](!)
type            = endpoint
context         = internal
disallow        = all
allow           = ulaw
allow           = alaw
allow           = g722
dtmf_mode       = rfc4733
direct_media    = no
rtp_symmetric   = yes
force_rport     = yes
rewrite_contact = yes

; ─── Agents SIP internes (1001–1010) ───────────────────────
[1001](agent-template)
auth            = auth1001
aors            = aor1001
callerid        = "Agent 1001" <1001>

[auth1001]
type            = auth
auth_type       = userpass
username        = 1001
password        = agent1001

[aor1001]
type            = aor
max_contacts    = 1
remove_existing = yes

[1002](agent-template)
