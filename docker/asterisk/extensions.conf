; ============================================================
; LNAYCRM — Dialplan (mode LOCAL SIMULATION sans SIP trunk)
; Contextes :
;   [internal]  Appels agent↔agent
;   [queues]    File d'attente ACD interne
; ============================================================

[globals]
QUEUE_SALES     = sales
RING_TIMEOUT    = 30
; URL webhook NestJS (réseau Docker interne : backend:3001)
NESTJS_WEBHOOK  = http://backend:3001/api/v1/calls/asterisk-event
RECORDINGS_DIR  = /var/spool/asterisk/monitor

; ─── Appels internes agent↔agent ────────────────────────────
[internal]
exten => _100X,1,NoOp(Appel interne vers ${EXTEN})
 same => n,Set(CALLERID(name)=${CALLERID(name)})
 same => n,Dial(PJSIP/${EXTEN},${RING_TIMEOUT},rT)
 same => n,Hangup()

; Simulation "appel entrant" depuis NestJS via AMI Originate
exten => _8XXX,1,NoOp(Simulation appel entrant ${EXTEN})
 same => n,Queue(${QUEUE_SALES},rRt,,${RING_TIMEOUT})
 same => n,Hangup()

; Test echo (utile pour vérifier SIP registration)
exten => 9999,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; ─── File d'attente ─────────────────────────────────────────
[queues]
exten => s,1,NoOp(Entrée file d'attente)
 same => n,Queue(${QUEUE_SALES},rRt,,${RING_TIMEOUT})
 same => n,Hangup()
