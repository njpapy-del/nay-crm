; ============================================================
; LNAYCRM — Asterisk AMI (Asterisk Manager Interface)
; Mode : LOCAL SIMULATION — sans SIP trunk
; NestJS se connecte via TCP 5038 (réseau Docker interne)
; ============================================================

[general]
enabled         = yes
port            = 5038
bindaddr        = 0.0.0.0     ; écoute sur toutes interfaces (Docker interne)
displayconnects = no
timestampevents = yes

; Compte NestJS backend (réseau Docker : backend → asterisk:5038)
[lnaycrm]
secret          = ${AMI_SECRET}
deny            = 0.0.0.0/0.0.0.0
permit          = 172.16.0.0/255.240.0.0   ; plage Docker par défaut
permit          = 10.0.0.0/255.0.0.0
read            = all
write           = all
writetimeout    = 5000
