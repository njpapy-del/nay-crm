# ============================================================
# LNAYCRM — Nginx Reverse Proxy
# Backend : http://backend:3001
# Frontend : http://frontend:3000
# WebSocket Socket.io : upgrade transparent
# ============================================================

# Optimisation upstream
upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ─── Map WebSocket upgrade ──────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Serveur principal ─────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Taille max upload (enregistrements, imports CSV)
    client_max_body_size 50M;

    # Timeouts pour WebSocket longue durée (agents connectés)
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # Headers communs
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API REST + WebSocket Socket.io ──────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Socket.io polling + WebSocket upgrade ───────────────
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Désactive le buffering pour les events temps réel
        proxy_buffering off;
    }

    # ── Swagger (dev uniquement) ────────────────────────────
    location /api/docs {
        proxy_pass http://backend;
    }

    # ── Enregistrements audio statiques ─────────────────────
    location /recordings/ {
        proxy_pass http://backend;
        proxy_buffering on;
    }

    # ── Frontend Next.js ────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── MinIO Console (accès direct si nécessaire) ──────────
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
    }
}
