; ============================================================
; LNAYCRM — queues.conf
; Configuration files d'attente ACD
; ============================================================

[general]
persistentmembers = yes
autofill           = yes
monitor-type       = MixMonitor
shared_lastcall    = yes

; ─────────────────────────────────────────────────────────────
; File commerciale
; ─────────────────────────────────────────────────────────────

[sales]
strategy         = leastrecent    ; agent le moins récemment utilisé
timeout          = 25             ; sonnerie par agent (sec)
retry            = 5              ; délai entre tentatives
maxlen           = 20             ; max appelants en attente
wrapuptime       = 10             ; pause post-appel obligatoire
announce-frequency = 30           ; annoncer position toutes les 30s
announce-position  = yes
musiconhold      = default
joinempty        = yes
leavewhenempty   = no
ringinuse        = no             ; ne pas sonner si déjà en appel
monitor-format   = wav

; Membres statiques (agents toujours dans la queue)
; Agents dynamiques via AMI: QueueAdd / QueueRemove
member => PJSIP/1000,0,Agent 1000
member => PJSIP/1001,0,Agent 1001
member => PJSIP/1002,0,Agent 1002
member => PJSIP/1003,0,Agent 1003

; ─────────────────────────────────────────────────────────────
; File support
; ─────────────────────────────────────────────────────────────

[support]
strategy    = ringall
timeout     = 20
retry       = 5
maxlen      = 10
wrapuptime  = 5
musiconhold = default
member      => PJSIP/1001,0,Support 1001
