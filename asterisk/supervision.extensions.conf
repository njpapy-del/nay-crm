; ============================================================
; LNAYCRM — supervision.extensions.conf
; À inclure dans extensions.conf : #include supervision.extensions.conf
;
; Modes ChanSpy :
;   q = quiet (pas de bip)
;   w = whisper (superviseur → agent seulement)
;   B = barge (superviseur rejoint les 2 côtés)
;   v = volume
; ============================================================

; ─────────────────────────────────────────────────────────────
[supervision]
; ─────────────────────────────────────────────────────────────

; ÉCOUTE SILENCIEUSE (superviseur entend tout, personne ne l'entend)
; Appel : exten=listen-1000  (écoute l'agent ext 1000)
exten => _listen-.,1,NoOp(Supervision LISTEN — agent PJSIP/${EXTEN:7})
 same  => n,Answer()
 same  => n,Wait(1)
 same  => n,ChanSpy(PJSIP/${EXTEN:7},qvg(-4))
 same  => n,Hangup()

; CHUCHOTEMENT (superviseur → agent uniquement, client n'entend rien)
; Appel : exten=whisper-1000
exten => _whisper-.,1,NoOp(Supervision WHISPER — agent PJSIP/${EXTEN:8})
 same  => n,Answer()
 same  => n,Wait(1)
 same  => n,ChanSpy(PJSIP/${EXTEN:8},qw)
 same  => n,Hangup()

; INTRUSION / BARGE-IN (3 participants : superviseur + agent + client)
; Appel : exten=barge-1000
exten => _barge-.,1,NoOp(Supervision BARGE — agent PJSIP/${EXTEN:6})
 same  => n,Answer()
 same  => n,Wait(1)
 same  => n,ChanSpy(PJSIP/${EXTEN:6},qBb)
 same  => n,Hangup()

; CONFÉRENCE BRIDGE (alternative barge via ConfBridge)
; Permet au superviseur de rejoindre un bridge existant
exten => _conf-.,1,NoOp(Supervision ConfBridge — room ${EXTEN:5})
 same  => n,Answer()
 same  => n,ConfBridge(${EXTEN:5},default,default,default)
 same  => n,Hangup()

; ─────────────────────────────────────────────────────────────
; Interception AMI — variables de contexte pour NestJS
; Définir avant l'originate :
;   Variable: SPY_SUPERVISOR_ID=<supervisorId>
;   Variable: SPY_TARGET_EXT=<agentExtension>
;   Variable: SPY_MODE=listen|whisper|barge
; ─────────────────────────────────────────────────────────────
