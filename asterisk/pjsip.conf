; ============================================================
; LNAYCRM — pjsip.conf
; Asterisk 20 LTS — Agents SIP + WebRTC + Trunk SIP
; ============================================================
; Numérotation interne : 1000-1099 (agents)
; Trunk entrant/sortant : [trunk-provider]
; ============================================================

; ─────────────────────────────────────────────────────────────
; TRANSPORTS
; ─────────────────────────────────────────────────────────────

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
; external_media_address = YOUR_PUBLIC_IP    ; décommenter si NAT
; external_signaling_address = YOUR_PUBLIC_IP

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

[transport-tls]
type = transport
protocol = tls
bind = 0.0.0.0:5061
cert_file = /etc/asterisk/keys/asterisk.crt
priv_key_file = /etc/asterisk/keys/asterisk.key
method = tlsv1_2

; WebSocket pour softphones WebRTC (navigateur)
[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8088

[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:8089
cert_file = /etc/asterisk/keys/asterisk.crt
priv_key_file = /etc/asterisk/keys/asterisk.key

; ─────────────────────────────────────────────────────────────
; TEMPLATES
; ─────────────────────────────────────────────────────────────

; Template commun agents SIP (softphone bureau)
[agent-sip-tpl](!)
type = endpoint
context = internal
transport = transport-udp
disallow = all
allow = ulaw,alaw,g722
direct_media = no
trust_id_outbound = yes
send_pai = yes
rtp_symmetric = yes
rewrite_contact = yes
force_rport = yes

; Template agents WebRTC (navigateur)
[agent-webrtc-tpl](!)
type = endpoint
context = internal
transport = transport-wss
disallow = all
allow = opus,ulaw,alaw
webrtc = yes
dtls_auto_generate_cert = yes
dtls_verify = fingerprint
dtls_setup = actpass
ice_support = yes
media_encryption = dtls
bundle = yes
use_avpf = yes
direct_media = no
rtp_symmetric = yes
rewrite_contact = yes

; ─────────────────────────────────────────────────────────────
; AGENTS (extensions 1000-1009 — étendre selon besoins)
; ─────────────────────────────────────────────────────────────
; Format :
;   [EXTEN]         → endpoint
;   [auth-EXTEN]    → authentification
;   [aor-EXTEN]     → address-of-record (contacts enregistrés)
; ─────────────────────────────────────────────────────────────

; --- Agent 1000 (SIP classique) ---
[1000](agent-sip-tpl)
aors = aor-1000
auth = auth-1000
callerid = "Agent 1000" <1000>

[auth-1000]
type = auth
auth_type = userpass
username = 1000
password = Ag1000!Secure

[aor-1000]
type = aor
max_contacts = 2
remove_existing = true
qualify_frequency = 30

; --- Agent 1001 (SIP classique) ---
[1001](agent-sip-tpl)
aors = aor-1001
auth = auth-1001
callerid = "Agent 1001" <1001>

[auth-1001]
type = auth
auth_type = userpass
username = 1001
password = Ag1001!Secure

[aor-1001]
type = aor
max_contacts = 2
remove_existing = true
qualify_frequency = 30

; --- Agent 1002 (WebRTC navigateur) ---
[1002](agent-webrtc-tpl)
aors = aor-1002
auth = auth-1002
callerid = "Agent WebRTC" <1002>

[auth-1002]
type = auth
auth_type = userpass
username = 1002
password = Ag1002!WebRTC

[aor-1002]
type = aor
max_contacts = 1
remove_existing = true

; --- Agent 1003 (WebRTC navigateur) ---
[1003](agent-webrtc-tpl)
aors = aor-1003
auth = auth-1003
callerid = "Agent WebRTC" <1003>

[auth-1003]
type = auth
auth_type = userpass
username = 1003
password = Ag1003!WebRTC

[aor-1003]
type = aor
max_contacts = 1
remove_existing = true

; ─────────────────────────────────────────────────────────────
; QUEUE ACD (distribution automatique d'appels)
; ─────────────────────────────────────────────────────────────

[queue-agent-1000]
type = endpoint
aors = aor-1000
auth = auth-1000
context = internal
disallow = all
allow = ulaw,alaw,g722
direct_media = no

; ─────────────────────────────────────────────────────────────
; TRUNK SIP PROVIDER (sortant/entrant)
; Remplacer les valeurs par celles de votre opérateur
; Testé avec : OVH Telecom, Twilio SIP, VoIP.ms, Zadarma
; ─────────────────────────────────────────────────────────────

[trunk-provider]
type = registration
transport = transport-udp
outbound_auth = auth-trunk
server_uri = sip:sip.votreprovider.com
client_uri = sip:VOTRE_NUMERO@sip.votreprovider.com
retry_interval = 60
forbidden_retry_interval = 600
expiration = 3600

[auth-trunk]
type = auth
auth_type = userpass
username = VOTRE_USERNAME_SIP
password = VOTRE_PASSWORD_SIP

[aor-trunk]
type = aor
contact = sip:sip.votreprovider.com

[trunk-provider-endpoint]
type = endpoint
transport = transport-udp
context = from-trunk
disallow = all
allow = ulaw,alaw,g722
aors = aor-trunk
outbound_auth = auth-trunk
from_user = VOTRE_NUMERO
from_domain = sip.votreprovider.com
direct_media = no
rtp_symmetric = yes
force_rport = yes

[trunk-provider-identify]
type = identify
endpoint = trunk-provider-endpoint
match = sip.votreprovider.com

; ─────────────────────────────────────────────────────────────
; GLOBAL AOR / Endpoint identification
; ─────────────────────────────────────────────────────────────

[global]
type = global
max_forwards = 70
user_agent = LNAYCRM-PBX/1.0
default_outbound_endpoint = trunk-provider-endpoint
