; ============================================================
; LNAYCRM — manager.conf (AMI — Asterisk Manager Interface)
; NestJS se connecte via TCP port 5038
; ============================================================

[general]
enabled       = yes
port          = 5038
bindaddr      = 127.0.0.1    ; écouter uniquement localhost
displayconnects = no
timestampevents = yes

; Compte NestJS
[lnaycrm]
secret   = AMI_LNAYCRM_SECRET_2024!   ; changer en production
deny     = 0.0.0.0/0.0.0.0
permit   = 127.0.0.1/255.255.255.255
read     = all
write    = all
writetimeout = 5000

; Compte monitoring (lecture seule)
[lnaycrm-monitor]
secret   = AMI_MONITOR_SECRET_2024!
deny     = 0.0.0.0/0.0.0.0
permit   = 127.0.0.1/255.255.255.255
read     = call,cdr,agent,queue
write    = originate
