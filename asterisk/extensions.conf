; ============================================================
; LNAYCRM — extensions.conf (Dialplan)
; Asterisk 20 LTS
; ============================================================
; Contextes :
;   [globals]         Variables globales
;   [internal]        Appels internes agent↔agent
;   [from-trunk]      Appels entrants trunk SIP → CRM
;   [outbound]        Appels sortants interne → trunk
;   [queues]          File d'attente ACD
;   [ivr-main]        Accueil/IVR entrant
;   [hangup-handler]  Nettoyage fin d'appel (CDR, webhook)
; ============================================================

; ─────────────────────────────────────────────────────────────
[globals]
; ─────────────────────────────────────────────────────────────
TRUNK            = trunk-provider-endpoint
DID_MAIN         = VOTRE_NUMERO_DID
QUEUE_SALES      = sales
RING_TIMEOUT     = 30
NESTJS_WEBHOOK   = http://127.0.0.1:3000/calls/asterisk-event
RECORDINGS_DIR   = /var/spool/asterisk/monitor

; ─────────────────────────────────────────────────────────────
[internal]
; Appels entre agents (1000-1099)
; ─────────────────────────────────────────────────────────────

; Appel direct agent → agent
exten => _1[0-9][0-9][0-9],1,NoOp(Appel interne ${CALLERID(num)} → ${EXTEN})
 same  => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same  => n,Dial(PJSIP/${EXTEN},${RING_TIMEOUT},tTkK)
 same  => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same  => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
 same  => n(busy),Busy(10)
 same  => n(noanswer),VoiceMail(${EXTEN}@default,u)
 same  => n,Hangup()

; Transfert aveugle (*2 + extension)
exten => _*2.,1,NoOp(Transfert → ${EXTEN:2})
 same  => n,BlindTransfer(PJSIP/${EXTEN:2})
 same  => n,Hangup()

; Conférence 3 voies (*3)
exten => *3,1,NoOp(Conférence 3-voies)
 same  => n,ConfBridge(${CALLERID(num)})
 same  => n,Hangup()

; Messagerie vocale propre agent (*97)
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)
 same  => n,Hangup()

; Echo test (*43)
exten => *43,1,Answer()
 same  => n,Echo()
 same  => n,Hangup()

; Sortant via trunk (numéros externes 0XXXXXXXXX, +33XXXXXXXXX)
exten => _0[679]XXXXXXXX,1,Goto(outbound,${EXTEN},1)
exten => _+33XXXXXXXXX,1,Goto(outbound,${EXTEN},1)
exten => _00X.,1,Goto(outbound,${EXTEN},1)

; Gestion invalid
exten => i,1,NoOp(Extension invalide : ${EXTEN})
 same  => n,Playback(pbx-invalid)
 same  => n,Hangup()

; ─────────────────────────────────────────────────────────────
[from-trunk]
; Appels entrants depuis le provider SIP
; ─────────────────────────────────────────────────────────────

exten => ${DID_MAIN},1,NoOp(Appel entrant DID ${DID_MAIN} de ${CALLERID(num)})
 same  => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same  => n,Answer()
 same  => n,Goto(ivr-main,s,1)

; Fallback numéro inconnu → file d'attente directe
exten => _X.,1,NoOp(DID inconnu ${EXTEN} → file d'attente)
 same  => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same  => n,Answer()
 same  => n,Goto(queues,${QUEUE_SALES},1)

exten => i,1,Playback(pbx-invalid)
 same  => n,Hangup()

; ─────────────────────────────────────────────────────────────
[ivr-main]
; Menu vocal interactif (IVR)
; ─────────────────────────────────────────────────────────────

exten => s,1,NoOp(IVR principal)
 same  => n,Set(IVR_ATTEMPTS=0)
 same  => n(menu),GotoIf($[${IVR_ATTEMPTS} >= 3]?hangup)
 same  => n,Background(custom/ivr-welcome)     ; votre audio custom
 same  => n,WaitExten(5)

; Choix 1 : Service commercial
exten => 1,1,NoOp(IVR → Commercial)
 same  => n,Goto(queues,${QUEUE_SALES},1)

; Choix 2 : Support
exten => 2,1,NoOp(IVR → Support)
 same  => n,Dial(PJSIP/1001,${RING_TIMEOUT},tT)
 same  => n,Goto(queues,${QUEUE_SALES},1)

; Choix 9 : Répéter
exten => 9,1,Set(IVR_ATTEMPTS=$[${IVR_ATTEMPTS} + 1])
 same  => n,Goto(ivr-main,s,menu)

; Timeout / invalide → répéter jusqu'à 3x
exten => t,1,Set(IVR_ATTEMPTS=$[${IVR_ATTEMPTS} + 1])
 same  => n,Goto(ivr-main,s,menu)

exten => i,1,Set(IVR_ATTEMPTS=$[${IVR_ATTEMPTS} + 1])
 same  => n,Goto(ivr-main,s,menu)

exten => hangup,1,Playback(goodbye)
 same  => n,Hangup()

; ─────────────────────────────────────────────────────────────
[queues]
; File d'attente ACD (Automatic Call Distribution)
; Agents : voir queues.conf
; ─────────────────────────────────────────────────────────────

exten => ${QUEUE_SALES},1,NoOp(File d'attente ${EXTEN})
 same  => n,Set(QUEUE_MAX_PENALTY=10)
 same  => n,MixMonitor(${RECORDINGS_DIR}/${UNIQUEID}.wav,b)
 same  => n,Queue(${EXTEN},tTkK,,${RING_TIMEOUT * 4})
 same  => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?timeout)
 same  => n,GotoIf($["${QUEUESTATUS}" = "FULL"]?full)
 same  => n,Hangup()
 same  => n(timeout),Playback(queue-thankyou)
 same  => n,Hangup()
 same  => n(full),Playback(all-circuits-busy)
 same  => n,Hangup()

; ─────────────────────────────────────────────────────────────
[outbound]
; Appels sortants agents → monde extérieur via trunk
; ─────────────────────────────────────────────────────────────

exten => _X.,1,NoOp(Appel sortant ${CALLERID(num)} → ${EXTEN})
 same  => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same  => n,Set(CALLERID(num)=${DID_MAIN})
 same  => n,MixMonitor(${RECORDINGS_DIR}/${UNIQUEID}.wav,b)
 same  => n,Dial(PJSIP/${EXTEN}@${TRUNK},${RING_TIMEOUT * 2},tTkK)
 same  => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
 same  => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
 same  => n(busy),Playback(busy)
 same  => n,Hangup()
 same  => n(noanswer),Playback(pbx-invalid)
 same  => n,Hangup()

; Inclure module supervision
#include supervision.extensions.conf

; ─────────────────────────────────────────────────────────────
[hangup-handler]
; Exécuté automatiquement à la fin de chaque appel
; Notifie NestJS via curl (ARI event ou webhook AMI)
; ─────────────────────────────────────────────────────────────

exten => s,1,NoOp(Hangup handler — UNIQUEID=${UNIQUEID} DURATION=${CDR(duration)})
 same  => n,System(curl -s -X POST "${NESTJS_WEBHOOK}" \
           -H "Content-Type: application/json" \
           -d '{"event":"hangup","uniqueid":"${UNIQUEID}","duration":"${CDR(duration)}","disposition":"${CDR(disposition)}","callerid":"${CDR(src)}","dest":"${CDR(dst)}"}' &)
 same  => n,Return()
