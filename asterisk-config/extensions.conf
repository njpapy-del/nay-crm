; ============================================================
; LNAYCRM - extensions.conf
; Asterisk 20 - Dialplan SIP Trunk OVH
;
; Contextes :
;   [globals]         - variables globales
;   [general]         - config globale dialplan
;   [agents]          - appels internes entre agents
;   [from-trunk]      - appels ENTRANTS depuis OVH
;   [outbound]        - appels SORTANTS vers OVH
;   [queues]          - files d'attente
;   [ivr-main]        - SVI (serveur vocal interactif)
;   [recording]       - enregistrement appels
; ============================================================

; ─────────────────────────────────────────────────────────────
; VARIABLES GLOBALES
; ─────────────────────────────────────────────────────────────

[globals]
; Ton numéro DDI entrant (format E.164 sans +)
DID_NUMBER=33156XXXXXX
; Trunk OVH (correspond au nom endpoint dans pjsip.conf)
TRUNK=ovh-trunk
; Dossier enregistrements (doit correspondre à RECORDINGS_PATH dans le backend)
RECORDINGS_DIR=/var/spool/asterisk/monitor
; Durée max d'un appel en secondes (1 heure)
MAX_CALL_DURATION=3600
; Extension voicemail par défaut si aucun agent dispo
VOICEMAIL_EXT=1000

; ─────────────────────────────────────────────────────────────
; GÉNÉRAL
; ─────────────────────────────────────────────────────────────

[general]
static=yes
writeprotect=no
autofallthrough=yes
clearglobalvars=no
extenpatternmatchnew=yes

; ─────────────────────────────────────────────────────────────
; CONTEXTE AGENTS — appels internes + décrochage file d'attente
; ─────────────────────────────────────────────────────────────

[agents]
; Appel interne entre postes (101, 102, 103...)
exten => _1XX,1,NoOp(Appel interne vers ${EXTEN})
 same => n,Set(CALLERID(num)=${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN},30,tT)
 same => n,Hangup()

; Appel sortant depuis un agent (préfixe 0 pour ligne extérieure)
; L'agent compose : 0 + numéro (ex: 0033612345678)
exten => _0.,1,NoOp(Appel sortant agent ${CALLERID(num)} vers ${EXTEN:1})
 same => n,Set(DEST=${EXTEN:1})
 same => n,Goto(outbound,${DEST},1)

; Voicemail
exten => *98,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; Consultation voicemail
exten => *97,1,VoiceMailMain()
 same => n,Hangup()

; Agent se met en pause (pour file d'attente)
exten => *1,1,NoOp(Agent ${CALLERID(num)} en pause)
 same => n,PauseQueueMember(,PJSIP/${CALLERID(num)})
 same => n,Playback(agent-loggedoff)
 same => n,Hangup()

; Agent reprend (sortie pause)
exten => *2,1,NoOp(Agent ${CALLERID(num)} reprend)
 same => n,UnpauseQueueMember(,PJSIP/${CALLERID(num)})
 same => n,Playback(agent-loggedin)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────
; CONTEXTE APPELS SORTANTS
; Format E.164 : on accepte numéros français et internationaux
; ─────────────────────────────────────────────────────────────

[outbound]
; Numéros mobiles/fixes français (06, 07, 01-05, 08, 09)
; Format international : 0033XXXXXXXXX → +33XXXXXXXXX
exten => _0033.,1,NoOp(Appel sortant OVH vers ${EXTEN})
 same => n,Set(CALLERID(num)=${GLOBAL(DID_NUMBER)})
 same => n,Set(CHANNEL(hangup_handler_push)=recording-handler,s,1)
 same => n,Dial(PJSIP/${EXTEN}@${GLOBAL(TRUNK)},${GLOBAL(MAX_CALL_DURATION)},gM(recording^${RECORDINGS_DIR}^${CDR(uniqueid)})T)
 same => n,Hangup()

; Format 0XXXXXXXXX (numéros français) → convertir en 0033XXXXXXXXX
exten => _0[1-9]XXXXXXXX,1,NoOp(Numéro FR ${EXTEN} → E.164)
 same => n,Set(DEST=0033${EXTEN:1})
 same => n,Goto(outbound,${DEST},1)

; Format +33XXXXXXXXX → convertir
exten => _+33.,1,NoOp(Format +33 reçu)
 same => n,Set(DEST=0033${EXTEN:1})
 same => n,Goto(outbound,${DEST},1)

; Format international générique (+XXXXXXXXXXX)
exten => _+.,1,NoOp(Appel international ${EXTEN})
 same => n,Set(DEST=00${EXTEN:1})
 same => n,Goto(outbound,${DEST},1)

; Format 00XXXXXXXXXXX (déjà E.164 sans +)
exten => _00[1-9].,1,NoOp(Appel E.164 ${EXTEN})
 same => n,Set(CALLERID(num)=${GLOBAL(DID_NUMBER)})
 same => n,Set(CHANNEL(hangup_handler_push)=recording-handler,s,1)
 same => n,Dial(PJSIP/${EXTEN}@${GLOBAL(TRUNK)},${GLOBAL(MAX_CALL_DURATION)},gT)
 same => n,Hangup()

; Gestion échec appel sortant
exten => failed,1,NoOp(Appel sortant échoué - ${HANGUPCAUSE})
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────
; CONTEXTE APPELS ENTRANTS — depuis trunk OVH
; ─────────────────────────────────────────────────────────────

[from-trunk]
; Appel entrant sur ton DDI
exten => ${GLOBAL(DID_NUMBER)},1,NoOp(Appel entrant depuis ${CALLERID(num)} vers ${EXTEN})
 same => n,Set(CDR(userfield)=inbound)
 same => n,Set(CALLERID(name)=${CALLERID(num)})
 ; Enregistrement automatique
 same => n,MixMonitor(${GLOBAL(RECORDINGS_DIR)}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${UNIQUEID}.wav,ab)
 ; Aller vers le SVI ou directement file d'attente
 same => n,Goto(ivr-main,s,1)

; Accepter aussi sans DDI (si trunk envoie juste "s")
exten => s,1,Goto(${GLOBAL(DID_NUMBER)},1)

; Numéro inconnu → rejet propre
exten => _.,1,NoOp(Appel entrant numéro inconnu ${EXTEN})
 same => n,Answer()
 same => n,Playback(invalid)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────
; SVI — Serveur Vocal Interactif
; ─────────────────────────────────────────────────────────────

[ivr-main]
exten => s,1,NoOp(SVI principal)
 same => n,Answer()
 same => n,Wait(1)
 ; Message d'accueil (fichier /var/lib/asterisk/sounds/lnaycrm/welcome.wav)
 ; Créer le fichier ou utiliser un TTS
 same => n,Background(lnaycrm/welcome)
 same => n,WaitExten(5)

; Si pas de touche → file d'attente directe
exten => t,1,Goto(queues,support,1)

; Touche 1 → File d'attente commerciale
exten => 1,1,NoOp(SVI → File commerciale)
 same => n,Goto(queues,sales,1)

; Touche 2 → File d'attente support
exten => 2,1,NoOp(SVI → File support)
 same => n,Goto(queues,support,1)

; Touche 0 → Voicemail général
exten => 0,1,NoOp(SVI → Voicemail)
 same => n,Playback(vm-nobodyavail)
 same => n,VoiceMail(${GLOBAL(VOICEMAIL_EXT)}@default,su)
 same => n,Hangup()

; Touche invalide → répéter
exten => i,1,NoOp(Touche invalide)
 same => n,Playback(invalid)
 same => n,Goto(s,1)

; ─────────────────────────────────────────────────────────────
; FILES D'ATTENTE
; (configuration détaillée dans queues.conf)
; ─────────────────────────────────────────────────────────────

[queues]
; File d'attente "sales" (commerciale)
exten => sales,1,NoOp(File d'attente commerciale)
 same => n,Set(QUEUE_MAX_PENALTY=10)
 same => n,Queue(sales,tT,,,120)
 same => n,NoOp(Sortie file: ${QUEUESTATUS})
 same => n,GotoIf($["${QUEUESTATUS}"="TIMEOUT"]?timeout)
 same => n,GotoIf($["${QUEUESTATUS}"="FULL"]?full)
 same => n,Hangup()

exten => sales,n(timeout),NoOp(File sales timeout)
 same => n,VoiceMail(${GLOBAL(VOICEMAIL_EXT)}@default,su)
 same => n,Hangup()

exten => sales,n(full),NoOp(File sales pleine)
 same => n,Playback(queue-full)
 same => n,Hangup()

; File d'attente "support"
exten => support,1,NoOp(File d'attente support)
 same => n,Queue(support,tT,,,120)
 same => n,NoOp(Sortie file: ${QUEUESTATUS})
 same => n,GotoIf($["${QUEUESTATUS}"="TIMEOUT"]?timeout)
 same => n,Hangup()

exten => support,n(timeout),NoOp(File support timeout)
 same => n,VoiceMail(${GLOBAL(VOICEMAIL_EXT)}@default,su)
 same => n,Hangup()

; ─────────────────────────────────────────────────────────────
; ENREGISTREMENT — handler raccroché
; ─────────────────────────────────────────────────────────────

[recording-handler]
exten => s,1,NoOp(Fin appel - enregistrement terminé pour ${CDR(uniqueid)})
 same => n,Return()

; ─────────────────────────────────────────────────────────────
; SUPERVISION — ChanSpy (barge/whisper)
; Accès depuis l'interface web via AMI
; ─────────────────────────────────────────────────────────────

[supervision]
; Espionner un agent spécifique (ex: 881 + extension agent)
exten => _881.,1,NoOp(ChanSpy sur agent ${EXTEN:3})
 same => n,ChanSpy(PJSIP/${EXTEN:3},q)
 same => n,Hangup()

; Whisper (parler à l'agent sans que le client entende)
exten => _882.,1,NoOp(Whisper sur agent ${EXTEN:3})
 same => n,ChanSpy(PJSIP/${EXTEN:3},wq)
 same => n,Hangup()

; Barge (rejoindre la conversation)
exten => _883.,1,NoOp(Barge sur agent ${EXTEN:3})
 same => n,ChanSpy(PJSIP/${EXTEN:3},Bq)
 same => n,Hangup()
