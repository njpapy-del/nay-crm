; ============================================================
; LNAYCRM - queues.conf
; ============================================================

[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor
shared_lastcall=yes

; ─────────────────────────────────────────────────────────────
; File commerciale "sales"
; ─────────────────────────────────────────────────────────────

[sales]
musiconhold=default
announce-frequency=30
announce-holdtime=yes
announce-position=yes
announce-position-limit=5
min-announce-frequency=15
periodic-announce=queue-periodic-announce
periodic-announce-frequency=60
; Stratégie : ringall = tous sonnent, leastrecent = le moins récemment utilisé
strategy=leastrecent
timeout=20
retry=5
weight=0
wrapuptime=10
maxlen=20
joinempty=yes
leavewhenempty=no
reportholdtime=yes
memberdelay=0
timeoutrestart=no
; Agents statiques (ajoutés aussi dynamiquement via AMI/ARI)
member => PJSIP/agent-101,0,Agent 101,PJSIP/agent-101
member => PJSIP/agent-102,0,Agent 102,PJSIP/agent-102
member => PJSIP/agent-103,0,Agent 103,PJSIP/agent-103

; ─────────────────────────────────────────────────────────────
; File support
; ─────────────────────────────────────────────────────────────

[support]
musiconhold=default
announce-frequency=30
announce-holdtime=yes
strategy=leastrecent
timeout=20
retry=5
wrapuptime=15
maxlen=15
joinempty=yes
leavewhenempty=no
member => PJSIP/agent-101,0,Agent 101,PJSIP/agent-101
member => PJSIP/agent-102,0,Agent 102,PJSIP/agent-102
