; ============================================================
; LNAYCRM - pjsip.conf
; Asterisk 20 - PJSIP - SIP Trunk + Agents SIP
;
; FOURNISSEUR : OVH Telecom (SIP Trunk)
; Remplace les valeurs marquées <<CHANGE_ME>> par tes vraies valeurs
; ============================================================

; ─────────────────────────────────────────────────────────────
; TRANSPORT - UDP (port 5060) + TLS (port 5061)
; ─────────────────────────────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Forcer l'IP publique si derrière NAT
; external_media_address=<<PUBLIC_IP>>
; external_signaling_address=<<PUBLIC_IP>>
; local_net=192.168.0.0/24

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.crt
priv_key_file=/etc/asterisk/keys/asterisk.key
; method=tlsv1_2

; ─────────────────────────────────────────────────────────────
; TRUNK SIP SORTANT/ENTRANT — OVH
;
; Remplace :
;   <<OVH_USERNAME>>  → identifiant ligne OVH (ex: 0033156XXXXXX)
;   <<OVH_PASSWORD>>  → mot de passe SIP OVH
;   <<OVH_SIP_HOST>>  → sip.ovh.net  (ou siptrunk.ovh.net pour trunk)
;   <<DID_NUMBER>>    → ton numéro DDI (ex: +33156XXXXXX)
; ─────────────────────────────────────────────────────────────

; --- Authentification OVH ---
[ovh-auth]
type=auth
auth_type=userpass
username=<<OVH_USERNAME>>
password=<<OVH_PASSWORD>>

; --- AOR (Address of Record) - où joindre le trunk ---
[ovh-aor]
type=aor
contact=sip:<<OVH_SIP_HOST>>
qualify_frequency=30
maximum_expiration=3600
minimum_expiration=60

; --- Endpoint OVH trunk ---
[ovh-trunk]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw
allow=alaw
allow=g729
; Pour trunk OVH : on n'utilise pas d'identification par IP — on s'authentifie
outbound_auth=ovh-auth
aors=ovh-aor
; Caller ID sortant (ton numéro OVH)
callerid="LNAYCRM" <<<DID_NUMBER>>>
; Codec preferences
direct_media=no
rtp_symmetric=yes
force_rport=yes
ice_support=no
; DTMF RFC2833
dtmf_mode=rfc4733
; SIP OPTIONS keepalive
qualify_frequency=30

; --- Identify : accepter appels entrants OVH par IP ---
[ovh-identify]
type=identify
endpoint=ovh-trunk
; IPs des serveurs SIP OVH (à vérifier sur docs.ovh.com/fr/voip/)
match=91.121.210.0/24
match=91.121.211.0/24
match=145.239.0.0/16

; ─────────────────────────────────────────────────────────────
; REGISTRATION — s'enregistrer chez OVH (obligatoire)
; ─────────────────────────────────────────────────────────────

[ovh-registration]
type=registration
transport=transport-udp
outbound_auth=ovh-auth
server_uri=sip:<<OVH_SIP_HOST>>
client_uri=sip:<<OVH_USERNAME>>@<<OVH_SIP_HOST>>
contact_user=<<OVH_USERNAME>>
retry_interval=60
max_retries=10
expiration=3600

; ─────────────────────────────────────────────────────────────
; AGENTS SIP — Softphones / Téléphones IP
;
; Template pour créer des agents rapidement
; ─────────────────────────────────────────────────────────────

; --- Template commun agents ---
[agent-template](!)
type=endpoint
transport=transport-udp
context=agents
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
dtmf_mode=rfc4733
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
send_pai=yes

; --- Agent 101 ---
[agent-101-auth]
type=auth
auth_type=userpass
username=agent101
password=<<AGENT101_PASSWORD>>

[agent-101-aor]
type=aor
max_contacts=2
qualify_frequency=60
remove_existing=yes

[agent-101](agent-template)
auth=agent-101-auth
aors=agent-101-aor
callerid="Agent 101" <101>
mailboxes=101@default

; --- Agent 102 ---
[agent-102-auth]
type=auth
auth_type=userpass
username=agent102
password=<<AGENT102_PASSWORD>>

[agent-102-aor]
type=aor
max_contacts=2
qualify_frequency=60
remove_existing=yes

[agent-102](agent-template)
auth=agent-102-auth
aors=agent-102-aor
callerid="Agent 102" <102>
mailboxes=102@default

; --- Agent 103 ---
[agent-103-auth]
type=auth
auth_type=userpass
username=agent103
password=<<AGENT103_PASSWORD>>

[agent-103-aor]
type=aor
max_contacts=2
qualify_frequency=60
remove_existing=yes

[agent-103](agent-template)
auth=agent-103-auth
aors=agent-103-aor
callerid="Agent 103" <103>
mailboxes=103@default

; ─────────────────────────────────────────────────────────────
; SUPERVISION / AMI WebRTC (si Asterisk avec res_pjsip_transport_websocket)
; ─────────────────────────────────────────────────────────────

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
