; ============================================================
; LNAYCRM - manager.conf
; Asterisk Manager Interface (AMI)
; Utilisé par le backend NestJS pour originate, spy, events
; ============================================================

[general]
enabled=yes
port=5038
bindaddr=127.0.0.1       ; IMPORTANT : uniquement loopback
webenabled=no
; Timeout session AMI inactive
displayconnects=yes
timestampevents=yes

; ─────────────────────────────────────────────────────────────
; Compte AMI pour le backend LNAYCRM
; ─────────────────────────────────────────────────────────────

[lnaycrm-backend]
secret=<<AMI_SECRET_CHANGE_ME>>
; Limiter accès à localhost uniquement
permit=127.0.0.1/255.255.255.255
deny=0.0.0.0/0.0.0.0
; Permissions nécessaires
read=all
write=all
; Événements reçus
eventfilter=Event: Hangup
eventfilter=Event: DialBegin
eventfilter=Event: DialEnd
eventfilter=Event: AgentCalled
eventfilter=Event: AgentComplete
eventfilter=Event: AgentConnect
eventfilter=Event: QueueMemberStatus
eventfilter=Event: QueueCallerJoin
eventfilter=Event: QueueCallerLeave
eventfilter=Event: MixMonitorStart
eventfilter=Event: MixMonitorStop
eventfilter=Event: Cdr

; ─────────────────────────────────────────────────────────────
; Compte AMI lecture seule pour supervision
; ─────────────────────────────────────────────────────────────

[lnaycrm-supervisor]
secret=<<SUPERVISOR_SECRET_CHANGE_ME>>
permit=127.0.0.1/255.255.255.255
deny=0.0.0.0/0.0.0.0
read=system,call,agent,user,queue
write=system,call,agent
