; ============================================================
; LNAYCRM - rtp.conf
; ============================================================

[general]
; Plage RTP (ouvrir ces ports sur le firewall)
rtpstart=10000
rtpend=20000
; ICE/STUN désactivé (activer si WebRTC)
icesupport=no
; DTLS pour WebRTC (désactivé par défaut)
; dtlsenable=yes
; dtlsverify=fingerprint
; dtlscertfile=/etc/asterisk/keys/asterisk.crt
; dtlsprivatekey=/etc/asterisk/keys/asterisk.key
