# ============================================================
# LNAYCRM — Docker Compose (MVP SaaS — 5 agents)
# DB : Supabase cloud (EXTERNE — non dockerisé)
# Services locaux : Redis, MinIO, Ollama, Asterisk, Nginx
# ============================================================

x-common: &common
  restart: always
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ─────────────────────────────────────────────────────────────
# RÉSEAU interne isolé
# ─────────────────────────────────────────────────────────────
networks:
  lnaycrm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─────────────────────────────────────────────────────────────
# VOLUMES persistants
# ─────────────────────────────────────────────────────────────
volumes:
  redis_data:
  minio_data:
  ollama_data:
  asterisk_spool:   # enregistrements audio
  asterisk_log:

# ─────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────
services:

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lnaycrm_redis
    <<: *common
    command: redis-server /etc/redis/redis.conf
    ports:
      - "127.0.0.1:6379:6379"    # local uniquement — pas internet
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - lnaycrm_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (Object Storage S3-compatible) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: lnaycrm_minio
    <<: *common
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-lnaycrm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_2024}
    ports:
      - "127.0.0.1:9000:9000"    # API S3
      - "127.0.0.1:9001:9001"    # Console web
    volumes:
      - minio_data:/data
    networks:
      - lnaycrm_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── MinIO init : création des buckets au premier démarrage ─
  minio-init:
    image: minio/mc:latest
    container_name: lnaycrm_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000
          $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} --quiet;
        mc mb --ignore-existing local/recordings;
        mc mb --ignore-existing local/exports;
        mc mb --ignore-existing local/files;
        mc anonymous set download local/files;
        echo 'Buckets MinIO prets';
      "
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-lnaycrm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_2024}
    networks:
      - lnaycrm_net
    restart: on-failure

  # ── Ollama (LLM local — IA chatbot + analytique) ──────────
  ollama:
    image: ollama/ollama:latest
    container_name: lnaycrm_ollama
    <<: *common
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE:          "24h"
      OLLAMA_NUM_PARALLEL:        "2"
      OLLAMA_MAX_LOADED_MODELS:   "1"
    networks:
      - lnaycrm_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # GPU Nvidia — décommenter si disponible :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama init : pull du modèle au premier démarrage ─────
  ollama-init:
    image: ollama/ollama:latest
    container_name: lnaycrm_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-gemma3:1b};
        echo 'Modele Ollama pret';
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - lnaycrm_net
    restart: on-failure

  # ── Asterisk (VoIP — mode simulation locale sans SIP trunk)
  asterisk:
    image: andrius/asterisk:alpine-20
    container_name: lnaycrm_asterisk
    <<: *common
    ports:
      - "127.0.0.1:5038:5038"      # AMI (NestJS → Asterisk)
      - "127.0.0.1:8088:8088"      # ARI + WebSocket SIP
      - "127.0.0.1:5060:5060/udp"  # SIP UDP agents softphone
    volumes:
      - ./docker/asterisk/manager.conf:/etc/asterisk/manager.conf:ro
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./docker/asterisk/queues.conf:/etc/asterisk/queues.conf:ro
      - ./docker/asterisk/http.conf:/etc/asterisk/http.conf:ro
      - asterisk_spool:/var/spool/asterisk
      - asterisk_log:/var/log/asterisk
    environment:
      AMI_SECRET: ${AMI_SECRET:-AMI_LNAYCRM_SECRET_2024!}
    networks:
      - lnaycrm_net
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx 'core show version' 2>/dev/null | grep -q Asterisk || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend NestJS ─────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: lnaycrm_backend
    image: lnaycrm/backend:latest
    <<: *common
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      NODE_ENV: production

      # ── Supabase (EXTERNE — ne pas modifier) ────────────
      DATABASE_URL: ${DATABASE_URL}

      # ── JWT ─────────────────────────────────────────────
      JWT_SECRET:             ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # ── Redis ────────────────────────────────────────────
      REDIS_URL:      redis://redis:6379
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_QUEUE_DB: 0
      REDIS_CACHE_DB: 1

      # ── MinIO Storage ────────────────────────────────────
      STORAGE_ENDPOINT:           http://minio:9000
      STORAGE_ACCESS_KEY:         ${MINIO_ROOT_USER:-lnaycrm_minio}
      STORAGE_SECRET_KEY:         ${MINIO_ROOT_PASSWORD:-minio_secret_2024}
      STORAGE_REGION:             us-east-1
      STORAGE_BUCKET_RECORDINGS:  recordings
      STORAGE_BUCKET_EXPORTS:     exports
      STORAGE_BUCKET_FILES:       files
      STORAGE_PUBLIC_URL:         ${STORAGE_PUBLIC_URL:-http://localhost:9000}

      # ── Ollama ──────────────────────────────────────────
      OLLAMA_URL:        http://ollama:11434
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-gemma3:1b}
      OLLAMA_TIMEOUT_MS: 120000

      # ── Asterisk AMI ────────────────────────────────────
      AMI_HOST:     asterisk
      AMI_PORT:     5038
      AMI_USERNAME: lnaycrm
      AMI_SECRET:   ${AMI_SECRET:-AMI_LNAYCRM_SECRET_2024!}

      # ── Recordings (volume partagé Asterisk) ─────────────
      RECORDINGS_PATH: /var/spool/asterisk/monitor

      # ── CORS ─────────────────────────────────────────────
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_CF_URL: ${FRONTEND_CF_URL:-}

      # ── Misc ─────────────────────────────────────────────
      BACKEND_PORT:   3001
      THROTTLE_TTL:   60
      THROTTLE_LIMIT: 100
      LOG_LEVEL:      ${LOG_LEVEL:-info}

    ports:
      - "3001:3001"    # direct ou via Cloudflare Tunnel
    volumes:
      - asterisk_spool:/var/spool/asterisk   # partage enregistrements
    networks:
      - lnaycrm_net

  # ── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    container_name: lnaycrm_frontend
    image: lnaycrm/frontend:latest
    <<: *common
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    networks:
      - lnaycrm_net

  # ── Nginx (reverse proxy — point d'entrée unique port 80) ─
  nginx:
    image: nginx:alpine
    container_name: lnaycrm_nginx
    <<: *common
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/lnaycrm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lnaycrm_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && curl -sf http://localhost/ -o /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
